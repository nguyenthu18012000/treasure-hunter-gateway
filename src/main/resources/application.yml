server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://localhost:8081/
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: http://localhost:8082/
          predicates:
            - Path=/user/**

        - id: character-service
          uri: http://localhost:8083/
          predicates:
            - Path=/character/**

        - id: socket-service
          uri: http://localhost:8084/
          predicates:
            - Path=/ws/**

jwt:
  public-key-path: classpath:keys/public_key.pem

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.web: DEBUG

